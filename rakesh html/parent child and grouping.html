<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rakesh html</title>
</head>
<body>
     <!-- type div>div>p>p>li then hit enter -->
    <div>
        <div>
            <p>
                <p>
                    <li></li>
                </p>
            </p>
        </div>
    </div>

    <!-- type div*5 then hit enter -->
    <div></div>
    <div></div>
    <div></div>
    <div></div>
    <div></div>

    <!-- type li*5 then hit enter -->
    <li></li>
    <li></li>
    <li></li>
    <li></li>
    <li></li>

    <!-- type ul>li*10 then hit enter -->
    <ul>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
    </ul>

    <!-- type div>p>li*5 then hit enter -->
    <div>
        <p>
            <p>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
            </p>
        </p>
    </div>

    <!-- type div.class1>p.classp>p#uniq1>li*5 then hit enter -->
    <div class="class1">
        <p class="classp">
            <p id="uniq1">
                <li></li>
                <li></li>
                <li></li>
                <li></li>
                <li></li>
            </p>
        </p>
    </div>

    <!-- type div>p+p+p then hit enter.it's called sibling -->
    <div>
        <p></p>
        <p></p>
        <p></p>
    </div>

    <!-- type div>(nav>li*5)+section then hhit enter.here   "(nav>li*5)""   and   "section"   this portion is under sibling. -->
    <div>
        <nav>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
            <li></li>
        </nav>
        <section></section>
    </div>
    
</body>
</html>
