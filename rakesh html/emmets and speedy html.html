<!-- emmets and speedy html -->
 <html>
 <head>
    <title>emmets</title>
 </head>
 <body>
    <!-- tagname.class  then hit enter
    <tagname class="class"></tagname>
    type p.rakesh,h3.header,h6.footer,div.header,div.section and hit enter -->
    <p class="rakesh"></p>
    <h3 class="header"></h3>
    <h6 class="footer"></h6>
    <div class="header"></div>
    <div class="section"></div>
    <!-- this is called class attributes -->

    <!-- tagname#id then hit enter
    <tagname id="id"></tagname>
    type h2#id1,p#id2,div#uniq1 and hit enter -->
     <h2 id="id1"></h2>
     <p id="id2"></p>
     <div id="uniq1"></div>
     <!-- this is called id attributes -->


     <!-- type  p[title="custom title"] and then hit enter
     <p title="custom title"></p> 
     type p[title="hello"],p[class="one"] and hit enter-->
      <p title="hello"></p>
      <p class="one"></p>
      <!-- in this way we can customise the name of attributes -->

      
    <!-- similar but having slight difference -->

     <!-- no 1. -->
    <!-- type p{lorem10} then hit enter -->
    <p>lorem10</p>
     <!-- type <p>lorem10</p> then hit enter -->
     <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Quae, sapiente.</p>

     <!-- no 2 -->
    <!-- type  p.one then hit enter -->
    <p class="one"></p>
    <!-- type p[class="one"] then hit enter -->
    <p class="one"></p>
 </body>
 </html>
